name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  terminal-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lancer les tests du simulateur de shell
        run: node tests/terminal.test.js
      - name: Lancer les tests de progression (XP, badges, sauvegarde)
        run: node tests/game.test.js
